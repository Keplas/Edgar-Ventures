# ── Render deployment configuration ──────────────────────────
# Docs: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: edgar-global-ventures
    runtime: python
    plan: free
    region: oregon          # change to: frankfurt, singapore, ohio, virginia as needed

    buildCommand: "./build.sh"
    startCommand: "gunicorn edgar_ventures.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --access-logfile -"

    envVars:
      # Render auto-generates a strong SECRET_KEY on first deploy
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "false"

      - key: PYTHON_VERSION
        value: "3.10.6"

      # Update this once you know your Render subdomain, e.g.:
      # edgar-global-ventures.onrender.com
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

      # ── Optional: add a Render PostgreSQL instance then paste its Internal URL here ──
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: egv-db
      #     property: connectionString
