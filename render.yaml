services:
  - type: web
    name: edgar-ventures
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn edgar_ventures.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.10.6
